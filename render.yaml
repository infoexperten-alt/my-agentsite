services:
  - type: web
    name: agentsite
    runtime: docker
    repo: https://github.com/jhd3197/AgentSite
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AGENTSITE_DEFAULT_MODEL
        value: openai/gpt-4o
      - key: AGENTSITE_HOST
        value: 0.0.0.0
      - key: AGENTSITE_PORT
        value: "6391"
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
