<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentSite — AI Website Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>
  <div class="app-layout">
    <!-- Left Sidebar -->
    <div class="app-left" id="sidebar"></div>

    <!-- Center Content -->
    <div class="app-center">
      <div class="center-top" id="preview"></div>
      <div id="progress"></div>
      <div class="center-bottom" id="chat"></div>
    </div>

    <!-- Right Panel -->
    <div class="app-right">
      <div id="model-selector"></div>
      <div id="style-controls"></div>
      <div id="usage"></div>
      <button id="export-btn" class="btn-primary export-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export ZIP
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
